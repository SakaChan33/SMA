name: CI

# Build, test, and lint on every push and pull request, on both Windows and
# Linux. Capstone (a C library) builds from source here; the runners already
# have the C toolchains, so no extra setup is needed.
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build (release)
        run: cargo build --release
      - name: Test
        run: cargo test
      - name: Clippy (warnings are errors)
        run: cargo clippy -- -D warnings
